name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Add explicit permissions
    steps:
      - uses: actions/checkout@v4  # Updated to v4
      
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}  # Use dynamic variable
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Required for snk@v3

      - uses: crazy-max/ghaction-github-pages@v4  # Updated to v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
